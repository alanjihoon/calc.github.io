<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>계산기</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://unpkg.com/mathlive/dist/mathlive.css">
  <script src="https://unpkg.com/mathlive/dist/mathlive.min.mjs" type="module"></script>
</head>
<body>
  <div class="calculator">
    <math-field id="mathlive-display" style="width:100%;font-size:1.5em;margin-bottom:10px;"></math-field>
    <div class="buttons">
      <button class="btn" id="sqrt">√</button>
      <button class="btn" data-value="(">(</button>
      <button class="btn" data-value=")">)</button>
      <button class="btn" id="square">x²</button>
      <button class="btn" data-value="7">7</button>
      <button class="btn" data-value="8">8</button>
      <button class="btn" data-value="9">9</button>
      <button class="btn" data-value="/">÷</button>
      <button class="btn" data-value="4">4</button>
      <button class="btn" data-value="5">5</button>
      <button class="btn" data-value="6">6</button>
      <button class="btn" data-value="*">×</button>
      <button class="btn" data-value="1">1</button>
      <button class="btn" data-value="2">2</button>
      <button class="btn" data-value="3">3</button>
      <button class="btn" data-value="-">-</button>
      <button class="btn" data-value="0">0</button>
      <button class="btn" data-value=".">.</button>
      <button class="btn" id="clear">C</button>
      <button class="btn" data-value="+">+</button>
      <button class="btn" id="equals">=</button>
    </div>
  </div>

  <script src="javascriptcode.js"></script>
</body>
</html>
